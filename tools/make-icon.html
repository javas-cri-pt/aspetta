<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>make icon</title></head>
<body>
<p>Clicca per scaricare le icone (cornetta iOS), poi spostale nella root del progetto.</p>
<button onclick="gen(180)">icon-180.png</button>
<button onclick="gen(512)">icon-512.png</button>
<script>
const PHONE = "M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58z";
function svg(size) {
  const rx = Math.round(size * 0.2246);
  const scale = (size * 0.52) / 16;
  const off = (size - 16 * scale) / 2;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5be36b"/><stop offset="1" stop-color="#12b73c"/>
    </linearGradient></defs>
    <rect width="${size}" height="${size}" rx="${rx}" fill="url(#g)"/>
    <g transform="translate(${off},${off}) scale(${scale})" fill="#fff"><path d="${PHONE}"/></g>
  </svg>`;
}
async function gen(size) {
  const img = new Image();
  img.src = 'data:image/svg+xml;base64,' + btoa(svg(size));
  await img.decode();
  const c = document.createElement('canvas');
  c.width = c.height = size;
  c.getContext('2d').drawImage(img, 0, 0, size, size);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon-${size}.png`;
  a.click();
}
</script>
</body></html>
